version: '3.8'

services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: web_server
    ports:
      - "80:8080"
    networks:
      - infra_red
    volumes:
      - web_content:/usr/share/nginx/html
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  db:
    image: postgres:15-alpine
    container_name: postgres_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: userdb
    networks:
      - infra_red
    volumes:
      - db_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  db_backup:
    image: postgres:15-alpine
    container_name: postgres_backup
    environment:
      PGHOST: db
      PGUSER: admin
      PGPASSWORD: secretpassword
      PGDATABASE: userdb
    volumes:
      - ./db_backups:/backups
    networks:
      - infra_red
    # Script que genera un respaldo automáticamente cada 24 horas (86400 segundos)
    entrypoint: |
      sh -c 'while true; do
        echo "Generando respaldo automatizado...";
        pg_dump -h db -U admin -F c -f /backups/backup_$$(date +%Y%m%d_%H%M%S).dump userdb;
        sleep 86400;
      done'
    depends_on:
      - db

  ftp:
    image: fauria/vsftpd
    container_name: ftp_server
    environment:
      FTP_USER: administrador
      FTP_PASS: admin123
      PASV_ADDRESS: 127.0.0.1
    ports:
      - "20:20"
      - "21:21"
      - "21100-21110:21100-21110"
    networks:
      - infra_red
    volumes:
      # Se mapea el volumen web_content a la carpeta FTP para compartir los archivos
      - web_content:/home/vsftpd/administrador
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 256M

networks:
  infra_red:
    name: infra_red
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  db_data:
  web_content:
