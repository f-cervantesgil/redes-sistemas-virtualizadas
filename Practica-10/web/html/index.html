<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servidor Web Seguro - Práctica 10</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e2f;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #2a2a40;
            padding: 3rem;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
        }
        h1 { color: #00d2ff; }
        p { font-size: 1.2rem; }
        .badge {
            background-color: #00d2ff;
            color: #000;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            margin-top: 15px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Servidor Web Contenerizado</h1>
        <p>Práctica 10 - Migración y Seguridad</p>
        <p>Este servidor se ejecuta como un usuario no administrativo.</p>
        <p>Las firmas del servidor (Server Tokens) están deshabilitadas.</p>
        <div class="badge">Nginx on Alpine Linux</div>
    </div>
</body>
</html>
