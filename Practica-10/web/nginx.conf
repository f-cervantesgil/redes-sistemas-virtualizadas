worker_processes 1;
pid /run/nginx/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;
    
    # OBLIGATORIO: Eliminar firmas del servidor (Server Tokens)
    server_tokens off;

    server {
        # Escuchamos en el puerto 8080 porque corremos sin permisos de root
        listen 8080;
        server_name localhost;

        location / {
            root /usr/share/nginx/html;
            index index.html index.htm;
            
            # Habilitar listado de directorios para que se vean los archivos subidos por FTP
            autoindex on;
        }
    }
}
