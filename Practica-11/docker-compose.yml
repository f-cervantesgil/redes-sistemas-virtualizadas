version: "3.8"

services:
  nginx:
    image: nginx:alpine
    container_name: proxy_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - red_publica
    restart: always
    depends_on:
      - webapp

  webapp:
    image: httpd:alpine
    container_name: web_secundario
    networks:
      - red_publica
    restart: always

  postgres_db:
    image: postgres:15-alpine
    container_name: servidor_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - red_datos
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: servidor_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - red_datos
      - red_gestion
    restart: always
    depends_on:
      postgres_db:
        condition: service_healthy

networks:
  red_publica:
    driver: bridge

  red_datos:
    driver: bridge
    internal: true

  red_gestion:
    driver: bridge

volumes:
  db_data:
  pgadmin_data: